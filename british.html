<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Веб-аналитика Google Analytics 4: замените G-XXXXXXXXXX на свой Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-XXXXXXXXXX");
    </script>
    <title>EYEBALLING | BRITISH 3 2020</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Шапка сайта -->
    <header class="site-header sticky-top">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between py-2">
          <a class="d-flex align-items-center text-decoration-none text-dark" href="index.html">
            <img src="assets/logo.svg" alt="Логотип EYEBALLING" class="logo-icon me-2" />
            <span class="brand-title">EYEBALLING</span>
          </a>
          <nav class="navbar navbar-expand-md p-0">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="list.html">Журналы</a></li>
                <li class="nav-item" id="authGuestNav"><a class="nav-link" href="form.html">Войти/Регистрация</a></li>
                <li class="nav-item d-none" id="authUserNav"><span class="nav-link" id="authUserName"></span></li>
                <li class="nav-item d-none" id="authLogoutNav"><button class="btn btn-sm btn-outline-dark ms-md-2" id="logoutBtn" type="button">Выйти</button></li>
              </ul>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main class="py-4">
      <div class="container">
        <!-- Детальная страница журнала в формате онлайн-книги -->
        <article class="detail-card p-3 p-md-4">
          <h1 class="text-center text-uppercase mb-4">BRITISH 3 2020</h1>
          <div class="row g-3">
            <!-- Левая колонка со всеми страницами -->
            <aside class="col-lg-3">
              <h2 class="h5 mb-3">Страницы журнала</h2>
              <div id="bookThumbnails" class="book-thumbnails"></div>
            </aside>

            <!-- Основной просмотр текущей страницы -->
            <section class="col-lg-9 book-main-column">
              <div class="book-reader p-2 p-md-3">
                <img id="bookMainImage" src="" alt="Текущая страница BRITISH 3 2020" class="book-main-image img-fluid rounded-2" />
              </div>
              <!-- Панель управления: стрелки и номер страницы по центру -->
              <div class="book-controls d-flex align-items-center justify-content-between mt-4">
                <button id="prevPage" class="btn btn-brand" type="button">Предыдущая</button>
                <span id="pageIndicator" class="fw-bold">Страница 1 / 1</span>
                <button id="nextPage" class="btn btn-brand" type="button">Следующая</button>
              </div>
            </section>
          </div>
        </article>
      </div>
    </main>

    <!-- Футер сайта -->
    <footer class="site-footer py-3 mt-4">
      <div class="container d-flex flex-column flex-md-row justify-content-between">
        <span>© 2026 EYEBALLING</span>
        <span><a class="text-decoration-none text-muted" href="list.html">Назад к списку</a></span>
      </div>
    </footer>

    <script>
      // Массив страниц журнала формируется автоматически по количеству страниц PDF
      const totalPages = 378;
      const bookPages = Array.from({ length: totalPages }, (_, index) =>
        `assets/british-pages/page-${String(index + 1).padStart(3, "0")}.webp`
      );

      const mainImage = document.getElementById("bookMainImage");
      const pageIndicator = document.getElementById("pageIndicator");
      const prevPageBtn = document.getElementById("prevPage");
      const nextPageBtn = document.getElementById("nextPage");
      const thumbnailsContainer = document.getElementById("bookThumbnails");
      let currentPage = 0;

      function renderPage(pageIndex) {
        currentPage = pageIndex;
        mainImage.src = bookPages[currentPage];
        mainImage.alt = `Страница ${currentPage + 1} журнала BRITISH 3 2020`;
        pageIndicator.textContent = `Страница ${currentPage + 1} / ${bookPages.length}`;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage === bookPages.length - 1;

        const thumbButtons = document.querySelectorAll(".book-thumb-btn");
        thumbButtons.forEach((button, index) => {
          button.classList.toggle("active", index === currentPage);
        });
      }

      // Рендер миниатюр всех страниц в боковой колонке
      bookPages.forEach((pageSrc, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "book-thumb-btn";
        button.innerHTML = `<img src="${pageSrc}" loading="lazy" alt="Миниатюра страницы ${index + 1}" /><span>${index + 1}</span>`;
        button.addEventListener("click", () => renderPage(index));
        thumbnailsContainer.appendChild(button);
      });

      prevPageBtn.addEventListener("click", () => {
        if (currentPage > 0) renderPage(currentPage - 1);
      });

      nextPageBtn.addEventListener("click", () => {
        if (currentPage < bookPages.length - 1) renderPage(currentPage + 1);
      });

      renderPage(0);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth-ui.js"></script>
    <script src="script.js"></script>
  </body>
</html>
