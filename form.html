<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EYEBALLING | Вход и регистрация</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Шапка сайта -->
    <header class="site-header sticky-top">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between py-2">
          <a class="d-flex align-items-center text-decoration-none text-dark" href="index.html">
            <img src="assets/logo.svg" alt="Логотип EYEBALLING" class="logo-icon me-2" />
            <span class="brand-title">EYEBALLING</span>
          </a>
          <nav class="navbar navbar-expand-md p-0">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="list.html">Журналы</a></li>
                <li class="nav-item" id="authGuestNav"><a class="nav-link" href="form.html">Войти/Регистрация</a></li>
                <li class="nav-item d-none" id="authUserNav"><span class="nav-link" id="authUserName"></span></li>
                <li class="nav-item d-none" id="authLogoutNav"><button class="btn btn-sm btn-outline-dark ms-md-2" id="logoutBtn" type="button">Выйти</button></li>
              </ul>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 col-xl-6">
            <!-- Блок авторизации и регистрации пользователя -->
            <section class="form-card p-4 p-md-5 shadow-sm">
              <h1 class="h2 text-center mb-4 text-uppercase">Войти / Регистрация</h1>

              <!-- Вкладки переключения между входом и регистрацией -->
              <ul class="nav nav-pills nav-fill mb-4" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">Вход</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-pane" type="button" role="tab">Регистрация</button>
                </li>
              </ul>

              <div class="tab-content" id="authTabsContent">
                <!-- Форма входа -->
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel" aria-labelledby="login-tab" tabindex="0">
                  <form id="loginForm" action="#" method="post">
                    <div class="mb-3">
                      <label for="loginEmail" class="form-label">Email</label>
                      <input type="email" class="form-control" id="loginEmail" placeholder="me@eyeballing.com" required />
                    </div>
                    <div class="mb-4">
                      <label for="loginPassword" class="form-label">Пароль</label>
                      <input type="password" class="form-control" id="loginPassword" placeholder="************" required />
                    </div>
                    <div class="d-grid">
                      <button type="submit" class="btn btn-brand">Войти</button>
                    </div>
                  </form>
                </div>

                <!-- Форма регистрации -->
                <div class="tab-pane fade" id="register-pane" role="tabpanel" aria-labelledby="register-tab" tabindex="0">
                  <form id="registerForm" action="#" method="post">
                    <div class="mb-3">
                      <label for="registerName" class="form-label">Имя</label>
                      <input type="text" class="form-control" id="registerName" placeholder="Ваше имя" required />
                    </div>
                    <div class="mb-3">
                      <label for="registerEmail" class="form-label">Email</label>
                      <input type="email" class="form-control" id="registerEmail" placeholder="me@eyeballing.com" required />
                    </div>
                    <div class="mb-3">
                      <label for="registerPassword" class="form-label">Пароль</label>
                      <input type="password" class="form-control" id="registerPassword" minlength="6" placeholder="минимум 6 символов" required />
                    </div>
                    <div class="mb-4">
                      <label for="registerRole" class="form-label">Роль</label>
                      <select id="registerRole" class="form-select">
                        <option>Читатель</option>
                        <option>Редактор</option>
                        <option>Администратор</option>
                      </select>
                    </div>
                    <div class="d-grid">
                      <button type="submit" class="btn btn-brand">Зарегистрироваться</button>
                    </div>
                  </form>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <!-- Футер сайта -->
    <footer class="site-footer py-3 mt-4">
      <div class="container d-flex flex-column flex-md-row justify-content-between">
        <span>© 2026 EYEBALLING</span>
        <span>Форма доступа для авторов и читателей</span>
      </div>
    </footer>

    <script>
      // Простая клиентская логика регистрации и входа для демо-сайта
      const STORAGE_KEY = "eyeballing_users";
      const SESSION_KEY = "eyeballing_current_user";

      function getUsers() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      }

      function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
      }

      document.getElementById("registerForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("registerName").value.trim();
        const email = document.getElementById("registerEmail").value.trim().toLowerCase();
        const password = document.getElementById("registerPassword").value;
        const role = document.getElementById("registerRole").value;

        const users = getUsers();
        const exists = users.some((user) => user.email === email);
        if (exists) {
          alert("Пользователь с таким email уже зарегистрирован.");
          return;
        }

        users.push({ name, email, password, role });
        saveUsers(users);
        alert("Регистрация успешна! Теперь вы можете войти.");
        event.target.reset();
        document.getElementById("login-tab").click();
      });

      document.getElementById("loginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const email = document.getElementById("loginEmail").value.trim().toLowerCase();
        const password = document.getElementById("loginPassword").value;

        const users = getUsers();
        const user = users.find((item) => item.email === email && item.password === password);

        if (!user) {
          alert("Неверный email или пароль.");
          return;
        }

        localStorage.setItem(SESSION_KEY, JSON.stringify(user));
        alert(`Добро пожаловать, ${user.name}! Роль: ${user.role}`);
        event.target.reset();
        window.location.href = "index.html";
      });
    </script>
    <script src="js/auth-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
